version: "3.9"

services:
  backend:
    build: ./backend
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/documents_registry.json:/app/documents_registry.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rag_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped